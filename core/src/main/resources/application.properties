spring.application.name=expenses-core

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/expenses_db?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool - limit to 3 to fit Clever Cloud free plan (max 5 connections)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=${JWT_SECRET:your_super_secret_key_replace_this_with_a_long_random_string_256bits}
app.jwt.expiration-ms=86400000

# App credentials (single user)
app.auth.username=${APP_USERNAME:anjana}
app.auth.password=${APP_PASSWORD:1234}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}
