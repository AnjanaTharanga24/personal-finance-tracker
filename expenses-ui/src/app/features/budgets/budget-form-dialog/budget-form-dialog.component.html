<h2 mat-dialog-title>{{ isEdit ? 'Edit Budget' : 'New Budget' }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="form">

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Category</mat-label>
      <mat-select formControlName="categoryId">
        <mat-option *ngFor="let cat of categories" [value]="cat.id">
          {{ cat.name }}
        </mat-option>
      </mat-select>
      <mat-error *ngIf="form.get('categoryId')?.hasError('required')">Category is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Budget Amount</mat-label>
      <input matInput type="number" formControlName="amount" min="0.01" step="0.01" />
      <mat-icon matPrefix>attach_money</mat-icon>
      <mat-error *ngIf="form.get('amount')?.hasError('required')">Amount is required</mat-error>
      <mat-error *ngIf="form.get('amount')?.hasError('min')">Must be greater than 0</mat-error>
    </mat-form-field>

    <div class="row">
      <mat-form-field appearance="outline" class="half-width">
        <mat-label>Month</mat-label>
        <mat-select formControlName="month">
          <mat-option *ngFor="let m of months" [value]="m.value">{{ m.label }}</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="half-width">
        <mat-label>Year</mat-label>
        <mat-select formControlName="year">
          <mat-option *ngFor="let y of years" [value]="y">{{ y }}</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="save()" [disabled]="form.invalid">
    {{ isEdit ? 'Update' : 'Set Budget' }}
  </button>
</mat-dialog-actions>
