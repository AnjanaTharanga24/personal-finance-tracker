<mat-sidenav-container class="sidenav-container">

  <mat-sidenav #sidenav
               [mode]="isHandset ? 'over' : 'side'"
               [opened]="sidenavOpened"
               class="sidenav">

    <div class="sidenav-header">
      <mat-icon class="app-icon">account_balance_wallet</mat-icon>
      <span class="app-title">Expenses</span>
      <button mat-icon-button class="close-btn" (click)="toggleSidenav()" *ngIf="isHandset">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <mat-nav-list>
      <a mat-list-item
         *ngFor="let item of navItems"
         [routerLink]="item.route"
         routerLinkActive="active-link"
         (click)="onNavItemClick()">
        <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
        <span matListItemTitle>{{ item.label }}</span>
      </a>
    </mat-nav-list>

  </mat-sidenav>

  <mat-sidenav-content class="main-content">

    <mat-toolbar color="primary" class="toolbar">
      <button mat-icon-button (click)="toggleSidenav()" class="menu-btn">
        <mat-icon>{{ sidenavOpened && !isHandset ? 'menu_open' : 'menu' }}</mat-icon>
      </button>
      <span class="toolbar-title">Expenses Manager</span>
      <span class="spacer"></span>
      <span class="username">{{ authService.getUsername() }}</span>
      <button mat-icon-button (click)="logout()" title="Logout">
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>

    <div class="content-area">
      <router-outlet></router-outlet>
    </div>

  </mat-sidenav-content>

</mat-sidenav-container>
